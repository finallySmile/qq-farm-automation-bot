# 文件路径: .github/workflows/qq-farm-bot-ci.yml
name: QQ农场机器人自动构建

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  detect-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检查上游是否有更新
        id: check
        run: |
          UPSTREAM_HASH=$(git ls-remote https://github.com/XyhTender/qq-farm-automation-bot.git HEAD | cut -f1)
          echo "上游最新提交哈希: $UPSTREAM_HASH"

          LAST_BUILD_HASH=$(cat last_build_hash.txt 2>/dev/null || echo "none")
          echo "本地记录的上次构建哈希: $LAST_BUILD_HASH"

          if [ "$UPSTREAM_HASH" = "$LAST_BUILD_HASH" ]; then
            echo "✅ 上游没有更新，跳过构建"
            echo "needs_build=false" >> $GITHUB_OUTPUT
          else
            echo "🚨 检测到上游有更新！"
            echo "needs_build=true" >> $GITHUB_OUTPUT
            echo "new_hash=$UPSTREAM_HASH" >> $GITHUB_OUTPUT
          fi

      - name: 2. 设置 Docker 构建环境
        id: setup-docker
        if: steps.check.outputs.needs_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: 3. 登录 Docker Hub
        id: login-dockerhub
        if: steps.check.outputs.needs_build == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 4. 基于上游代码构建并推送镜像
        id: build-and-push
        if: steps.check.outputs.needs_build == 'true'
        run: |
          # 创建一个临时目录
          TEMP_DIR=$(mktemp -d)

          echo "正在克隆上游仓库代码..."
          git clone --depth 1 https://github.com/XyhTender/qq-farm-automation-bot.git $TEMP_DIR

          echo "检查项目结构..."
          # 检查core目录是否存在
          if [ -d "$TEMP_DIR/core" ]; then
            echo "✅ 找到 core 目录"
            echo "core 目录内容："
            ls -la $TEMP_DIR/core/
          else
            echo "❌ 未找到 core 目录"
            echo "根目录内容："
            ls -la $TEMP_DIR
            exit 1
          fi

          echo "开始构建 Docker 镜像..."
          # 构建镜像
          docker buildx build \
            --platform linux/amd64 \
            -f $TEMP_DIR/core/Dockerfile \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/qq-farm-automation-bot:latest \
            --push \
            $TEMP_DIR

          # 清理临时文件
          rm -rf $TEMP_DIR

          echo "构建完成，准备更新哈希记录..."

      - name: 5. 更新哈希记录（可选）
        id: update-hash
        if: steps.check.outputs.needs_build == 'true'
        run: |
          # 在fork仓库的目录中保存哈希记录
          echo ${{ steps.check.outputs.new_hash }} > last_build_hash.txt

          # 配置git并提交
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add last_build_hash.txt
          git commit -m "更新构建哈希记录: ${{ steps.check.outputs.new_hash }}" || echo "没有文件需要提交"
          git push || echo "推送失败，但镜像已成功构建"

      - name: 6. 构建完成通知
        id: notify
        if: steps.check.outputs.needs_build == 'true'
        run: |
          echo "================================"
          echo "✅ 镜像构建成功！"
          echo "镜像地址: ${{ secrets.DOCKERHUB_USERNAME }}/qq-farm-automation-bot:latest"
          echo "基于上游提交: ${{ steps.check.outputs.new_hash }}"
          echo "构建完成时间: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "================================"
