name: QQ农场机器人自动构建

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 设置 Docker 环境
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 构建并推送镜像
        run: |
          TEMP_DIR=$(mktemp -d)
          git clone --depth 1 https://github.com/XyhTender/qq-farm-automation-bot.git $TEMP_DIR

          docker buildx build \
            --platform linux/amd64 \
            -f $TEMP_DIR/core/Dockerfile \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/qq-farm-automation-bot:latest \
            --push \
            $TEMP_DIR

          rm -rf $TEMP_DIR
          echo "✅ 镜像已更新"
