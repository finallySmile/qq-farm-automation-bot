# 文件路径: .github/workflows/qq-farm-bot-ci.yml
name: QQ农场机器人自动构建 (优化版)

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 设置 Docker 环境
        uses: docker/setup-buildx-action@v3
        with:
          # 使用最新版本，避免缓存问题
          version: latest

      - name: 2. 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 3. 清理旧镜像（尝试）
        run: |
          echo "尝试清理 Docker Hub 上的旧镜像..."
          echo "注意：Docker Hub 免费账户 API 限制较多，清理可能需要手动完成"

          # 尝试使用 Docker Hub API 删除旧镜像（可能需要认证）
          # 由于免费账户限制，这里主要是提示信息
          echo "如果镜像过多，请手动清理："
          echo "1. 登录 Docker Hub"
          echo "2. 进入你的仓库"
          echo "3. 删除所有无标签的旧镜像"
          echo "4. 保留最新的 'latest' 标签"

      - name: 4. 构建单平台镜像
        run: |
          TEMP_DIR=$(mktemp -d)

          echo "克隆上游代码..."
          git clone --depth 1 https://github.com/XyhTender/qq-farm-automation-bot.git $TEMP_DIR

          echo "开始构建单平台镜像..."
          # 关键优化：只构建 linux/amd64 平台，避免多平台镜像
          docker buildx build \
            --platform linux/amd64 \
            --no-cache \
            -f $TEMP_DIR/core/Dockerfile \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/qq-farm-automation-bot:latest \
            --push \
            $TEMP_DIR

          rm -rf $TEMP_DIR

          echo "✅ 单平台镜像构建完成"

      - name: 5. 验证镜像
        run: |
          echo "镜像信息："
          echo "仓库：${{ secrets.DOCKERHUB_USERNAME }}/qq-farm-automation-bot"
          echo "标签：latest"
          echo "平台：linux/amd64"
          echo "================================"

      - name: 6. 构建完成通知
        run: |
          echo "================================"
          echo "✅ 优化构建完成！"
          echo "镜像地址：${{ secrets.DOCKERHUB_USERNAME }}/qq-farm-automation-bot:latest"
          echo "构建时间：$(date '+%Y-%m-%d %H:%M:%S')"
          echo "================================"
