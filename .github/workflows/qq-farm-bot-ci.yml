name: QQ农场机器人传统构建

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 设置 Docker 环境
        uses: docker/setup-docker@v1

      - name: 2. 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 3. 传统构建并推送
        run: |
          TEMP_DIR=$(mktemp -d)

          echo "克隆上游代码..."
          git clone --depth 1 https://github.com/XyhTender/qq-farm-automation-bot.git $TEMP_DIR

          echo "切换到 core 目录..."
          cd $TEMP_DIR/core

          echo "开始传统构建..."
          # 使用传统 docker build，不使用 Buildx
          docker build \
            --no-cache \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/qq-farm-automation-bot:latest .

          echo "推送镜像..."
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/qq-farm-automation-bot:latest

          echo "清理..."
          cd ..
          rm -rf $TEMP_DIR

          echo "✅ 构建完成"

      - name: 4. 构建完成通知
        run: |
          echo "================================"
          echo "✅ 镜像构建完成！"
          echo "镜像地址：${{ secrets.DOCKERHUB_USERNAME }}/qq-farm-automation-bot:latest"
          echo "构建方式：传统 Docker 构建（非 Buildx）"
          echo "构建时间：$(date '+%Y-%m-%d %H:%M:%S')"
          echo "================================"
