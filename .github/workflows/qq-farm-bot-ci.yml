# 文件路径: .github/workflows/qq-farm-bot-ci.yml
name: QQ农场机器人自动构建

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  detect-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检查上游是否有更新
        id: check
        run: |
          # 获取上游仓库最新的提交哈希
          UPSTREAM_HASH=$(git ls-remote https://github.com/XyhTender/qq-farm-automation-bot.git HEAD | cut -f1)
          echo "上游最新提交哈希: $UPSTREAM_HASH"

          # 获取当前工作流运行时的提交哈希（来自环境变量）
          CURRENT_HASH=$(echo ${{ github.sha }})
          echo "当前工作流提交哈希: $CURRENT_HASH"

          # 对比哈希（如果相同，说明没有更新）
          if [ "$UPSTREAM_HASH" = "$CURRENT_HASH" ]; then
            echo "✅ 上游没有更新，跳过构建"
            echo "needs_build=false" >> $GITHUB_OUTPUT
          else
            echo "🚨 检测到上游有更新！"
            echo "needs_build=true" >> $GITHUB_OUTPUT
          fi

      - name: 2. 设置 Docker 构建环境
        id: setup-docker
        if: steps.check.outputs.needs_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: 3. 登录 Docker Hub
        id: login-dockerhub
        if: steps.check.outputs.needs_build == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 4. 基于上游代码构建并推送镜像
        id: build-and-push
        if: steps.check.outputs.needs_build == 'true'
        run: |
          # 创建临时目录
          TEMP_DIR=$(mktemp -d)

          echo "正在克隆上游仓库代码..."
          git clone --depth 1 https://github.com/XyhTender/qq-farm-automation-bot.git $TEMP_DIR

          echo "开始构建 Docker 镜像..."
          # 构建并推送镜像（相同标签会自动覆盖旧版本）
          docker buildx build \
            --platform linux/amd64 \
            -f $TEMP_DIR/core/Dockerfile \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/qq-farm-automation-bot:latest \
            --push \
            $TEMP_DIR

          # 清理临时文件
          rm -rf $TEMP_DIR

          echo "✅ 镜像已推送，旧版本自动覆盖"

      - name: 5. 构建完成通知
        id: notify
        if: steps.check.outputs.needs_build == 'true'
        run: |
          echo "================================"
          echo "✅ 镜像构建成功！"
          echo "镜像地址: ${{ secrets.DOCKERHUB_USERNAME }}/qq-farm-automation-bot:latest"
          echo "构建时间: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "================================"
