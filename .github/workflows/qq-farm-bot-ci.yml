# 文件路径: .github/workflows/qq-farm-bot-ci.yml
name: QQ农场机器人极简构建 (单镜像版)

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 清理本地 Docker 缓存
        run: |
          echo "清理本地 Docker 缓存..."
          docker system prune -af --volumes
          echo "✅ 本地缓存已清理"

      - name: 2. 设置 Docker Buildx（最小配置）
        uses: docker/setup-buildx-action@v3
        with:
          version: latest
          # 禁用缓存，避免生成额外镜像层
          driver-opts: |
            image=moby/buildkit:master
            network=host

      - name: 3. 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 4. 构建单镜像（无缓存、无多平台）
        run: |
          TEMP_DIR=$(mktemp -d)

          echo "克隆上游代码..."
          git clone --depth 1 https://github.com/XyhTender/qq-farm-automation-bot.git $TEMP_DIR

          echo "构建单镜像..."
          # 关键参数：
          # --no-cache: 完全禁用缓存
          # --platform linux/amd64: 只构建单平台
          # --load: 加载到本地（可选，但我们直接推送）
          # --push: 推送到仓库
          docker buildx build \
            --no-cache \
            --platform linux/amd64 \
            -f $TEMP_DIR/core/Dockerfile \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/qq-farm-automation-bot:latest \
            --push \
            $TEMP_DIR

          rm -rf $TEMP_DIR

          echo "✅ 单镜像构建完成"

      - name: 5. 验证镜像数量
        run: |
          echo "检查 Docker Hub 上的镜像数量..."
          echo "请手动登录 Docker Hub 查看："
          echo "https://hub.docker.com/repository/docker/${{ secrets.DOCKERHUB_USERNAME }}/qq-farm-automation-bot"
          echo "如果仍然有多个镜像，可能是 Dockerfile 的问题"

      - name: 6. 构建完成通知
        run: |
          echo "================================"
          echo "✅ 极简构建完成！"
          echo "镜像地址：${{ secrets.DOCKERHUB_USERNAME }}/qq-farm-automation-bot:latest"
          echo "构建时间：$(date '+%Y-%m-%d %H:%M:%S')"
          echo "================================"
